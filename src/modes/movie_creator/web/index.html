<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Movie Creator</title>
<style>
:root {
    --bg: #1e1e2e; --surface: #252536; --surface2: #2a2a3d; --surface3: #313147;
    --border: #333350; --text: #cdd6f4; --text-dim: #6c7086;
    --accent: #89b4fa; --green: #a6e3a1; --warn: #f9e2af; --red: #f38ba8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

/* Header + tabs */
.header { display: flex; align-items: center; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0; }
.header h1 { font-size: 16px; font-weight: 600; }
.header .status { font-size: 12px; color: var(--text-dim); margin-left: auto; }
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tabs .tab { padding: 10px 24px; cursor: pointer; font-size: 13px; color: var(--text-dim); border-bottom: 2px solid transparent; }
.tabs .tab:hover { color: var(--text); }
.tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 3-column layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); gap: 8px; }
.sidebar-header span { font-size: 12px; color: var(--text-dim); text-transform: uppercase; flex: 1; }
.entity-list { flex: 1; overflow-y: auto; }
.list-empty { padding: 20px; color: var(--text-dim); font-size: 13px; text-align: center; }

/* List items */
.entity-item { display: flex; align-items: center; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); gap: 8px; font-size: 13px; }
.entity-item:hover { background: var(--surface2); }
.entity-item.active { background: var(--accent); color: #1e1e2e; }
.entity-item .num { font-size: 11px; font-weight: 600; min-width: 20px; opacity: 0.6; }
.entity-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entity-item .thumb { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface3); }

/* Generation gallery */
.gen-gallery { display: flex; flex-direction: column; gap: 10px; outline: none; border-radius: 8px; padding: 8px; transition: outline-color 0.15s; }
.gen-gallery:focus { outline: 1px solid var(--border); }
.gen-gallery.dragover { outline: 2px dashed var(--accent); background: rgba(137, 180, 250, 0.05); }
.gen-gallery-header { display: flex; align-items: center; gap: 8px; }
.gen-gallery-header span { flex: 1; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.gen-empty { padding: 16px; background: var(--surface2); border-radius: 6px; color: var(--text-dim); font-size: 12px; text-align: center; }
.gen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.gen-tile { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.gen-tile.primary { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.gen-image { position: relative; width: 100%; aspect-ratio: 1; background: var(--surface3); border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.gen-image img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

/* Lightbox */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 200; cursor: zoom-out; padding: 40px; }
.lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
.gen-status { font-size: 11px; color: var(--text-dim); text-transform: uppercase; padding: 4px 8px; }
.gen-status.queued { color: var(--text-dim); }
.gen-status.generating { color: var(--warn); animation: pulse 1.5s infinite; }
.gen-status.failed { color: var(--red); }
.gen-primary-badge { position: absolute; top: 4px; right: 4px; background: var(--accent); color: #1e1e2e; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
.gen-prompt { font-size: 11px; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.gen-actions { display: flex; gap: 4px; flex-wrap: wrap; }
.gen-actions .btn { flex: 1; padding: 3px 6px; font-size: 11px; }
.gen-actions .btn-danger { flex: 0 0 auto; }

/* Center — editor */
.center { flex: 1 1 0; display: flex; flex-direction: column; overflow: hidden; min-width: 200px; min-height: 0; }
.center-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 14px; }
.editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-header { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); gap: 10px; }
.editor-header h2 { font-size: 16px; font-weight: 500; flex: 1; }
.editor-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field.grow { flex: 1 0 auto; min-height: 140px; }
.field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; }
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.center .field.grow textarea { min-height: 300px; }
.field.grow textarea { flex: 1; resize: none; }
.editor-footer { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }
.editor-footer .spacer { flex: 1; }
.btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; background: var(--surface2); color: var(--text); font-family: inherit; }
.btn:hover { background: var(--surface3); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-primary { background: var(--accent); color: #1e1e2e; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { background: var(--red); color: #1e1e2e; border-color: var(--red); }
.btn-danger:hover { opacity: 0.85; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal .editor { width: 480px; }
.editor.create_scene, .editor.update_scene, .editor.create_shots_bulk { width: 720px; }
.editor.create_scene textarea, .editor.update_scene textarea, .editor.create_shots_bulk textarea { min-height: 300px; }

/* Chat */
.chat { flex: 1 1 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); min-width: 200px; }
.chat-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
.msg { margin-bottom: 10px; font-size: 13px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; max-width: 90%; white-space: pre-wrap; }
.msg.user { background: var(--accent); color: #1e1e2e; margin-left: auto; }
.msg.assistant { background: var(--surface2); }
.msg.thinking { background: var(--surface2); font-size: 12px; color: var(--text-dim); font-style: italic; }
.msg.thinking.collapsed { max-height: 34px; overflow: hidden; cursor: pointer; opacity: 0.5; white-space: nowrap; text-overflow: ellipsis; }
.msg.thinking.collapsed:hover { opacity: 0.7; }
.msg.tool_call { background: var(--surface3); font-size: 12px; color: var(--text-dim); border-left: 3px solid var(--accent); padding: 6px 10px; }
.msg.approval { background: var(--warn); color: #1e1e2e; cursor: pointer; font-size: 12px; border-left: 3px solid #e0a800; padding: 6px 10px; }
.msg.approval:hover { opacity: 0.85; }
.msg.approval.resolved { opacity: 0.5; cursor: default; }
.processing { padding: 8px 12px; font-size: 12px; color: var(--text-dim); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.chat-input { display: flex; border-top: 1px solid var(--border); }
.chat-input textarea { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 12px; font-size: 13px; resize: none; height: 56px; font-family: inherit; }
.chat-input textarea:focus { outline: none; }
.chat-input button { background: var(--accent); color: #1e1e2e; border: none; padding: 0 16px; cursor: pointer; font-size: 14px; }

/* Storyboard */
.sb-modes { display: flex; gap: 4px; margin-right: auto; margin-left: 12px; }
.shot-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
.shot-card.compact { flex-direction: row; align-items: center; }
.shot-card .shot-num { font-size: 12px; font-weight: 600; color: var(--text-dim); min-width: 24px; }
.shot-card .shot-thumb { width: 96px; height: 54px; background: var(--surface3); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.shot-card .shot-thumb img { width: 100%; height: 100%; object-fit: cover; }
.shot-card .shot-preview { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.shot-card .shot-row { display: flex; align-items: flex-start; gap: 8px; }
.shot-card .shot-desc { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; line-height: 1.5; resize: vertical; min-height: 80px; }
.shot-card .shot-desc:focus { outline: none; border-color: var(--accent); }

.resizer { width: 4px; cursor: col-resize; flex-shrink: 0; }
.resizer:hover { background: var(--accent); }
</style>
</head>
<body>
<script type="module" src="/app.js"></script>
</body>
</html>
